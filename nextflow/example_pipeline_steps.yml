# Pipeline step directory layout.
#
# Each key is a logical step name; `dir` is the subdirectory under output_dir
# where that step writes its zarr.  `intermediate: true` marks steps whose
# output can be deleted after assembly (used by `biahub nf clean-intermediates`).
#
# Override this file per-workflow: a Dragonfly pipeline might omit deskew,
# reorder steps, or mark different steps as intermediate.

steps:
  flat_field:
    dir: "0-flatfield"
    intermediate: true
  deskew:
    dir: "1-deskew"
    intermediate: true
  reconstruct:
    dir: "2-reconstruct"
    intermediate: true
  virtual_stain:
    dir: "3-virtual-stain"
    intermediate: true
  track:
    dir: "4-track"
    intermediate: false
  assemble:
    dir: "5-assemble"
    intermediate: false
