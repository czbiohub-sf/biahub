# biahub tile-stitch — CPU dispatcher example (c0032 reproduction).
#
# Submission:
#   sbatch scripts/tile_stitch/example_tile_stitch_cpu.sh \
#       --config settings/example_tile_stitch_cpu.yml \
#       --input /hpc/projects/waveorder/tile-stitch/sample_datasets/l0_brightfield_fov.zarr \
#       --output /hpc/projects/waveorder/tile-stitch/runs/repro_c0032/output \
#       --channel "camera 22500102 view 0 @ 780nm"

tile_stitch:
  tile:
    tile_size: {z: 512, y: 512, x: 512}
    overlap:   {z: 32,  y: 32,  x: 32}
  blend:
    kind: gaussian_mean
    accumulator_dtype: float32
    sigma_fraction: 0.125
  recon:
    kind: phase
    transfer_function:
      yx_pixel_size: 0.1842
      z_pixel_size: 0.1842
      z_padding: 50
      z_focus_offset: -0.1775253564119339
      index_of_refraction_media: 1.3
      numerical_aperture_detection: 1.1
      numerical_aperture_illumination: 0.8
      wavelength_illumination: 0.76
      invert_phase_contrast: false
      tilt_angle_zenith: -0.47925180196762085
      tilt_angle_azimuth: -0.07744445651769638
    apply_inverse:
      reconstruction_algorithm: Tikhonov
      regularization_strength: 0.01
      TV_rho_strength: 0.001
      TV_iterations: 1

cpu_pool:
  partition: cpu
  workers_min: 8
  workers_max: 32
  worker_cores: 16
  worker_memory: 64GB        # bump if Stage A batches push past 95% memory threshold
  worker_walltime: "01:00:00"
  dask_threads: 1            # 1 task at a time per worker (memory-bound)
  blas_threads: 16            # full BLAS pool per task
  zarr_async_concurrency: 4
  zarr_threading_max_workers: 4
  preempt_signal_secs: 90
  scratch_dir: /hpc/projects/waveorder/tile-stitch/runs/repro_c0032/scratch
  pool_mode: adapt
  # prewarm=0 dispatches against an empty cluster; workers pull as they
  # land. Skips ~5 min of wait_for_workers on busy partitions. Set to N
  # only when you specifically want a min-cluster guarantee at t=0.
  prewarm_workers: 0
  prewarm_timeout_s: 60
  batch_size: 4   # c0032 winner — K=4 + dask_threads=1

retries: 1
run_dir: /hpc/projects/waveorder/tile-stitch/runs/repro_c0032
