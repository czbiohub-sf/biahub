mode: "2D"
fov: "*/*/*"
z_range: null
target_channel: nuclei_prediction

# Waveorder focus finding (overrides z_range when set)
focus_config:
  NA_det: 1.35
  lambda_ill: 0.500
  pixel_size: 0.1133
  z_window: 40

# Segmentation method: "foreground_contour" or "cellpose"
segmentation_method: cellpose

cellpose_config:
  model_type: nuclei
  diameter: 80
  cellprob_threshold: 0.0
  flow_threshold: 0.4
  gpu: true
  min_size: 2500
  input_channel: nuclei_prediction
  labels_sigma: 5.0

input_images:
  - path: null  # overridden by --input-images-path at runtime
    channels:
      nuclei_prediction:
        - function: np.mean
          kwargs:
            axis: 1
          per_timepoint: false

  # Uncomment below for foreground_contour segmentation method
  #     - function: ultrack.imgproc.normalize
  #       kwargs:
  #         gamma: 0.7
  #   membrane_prediction:
  #     - function: np.mean
  #       kwargs:
  #         axis: 1
  #       per_timepoint: false
  #     - function: ultrack.imgproc.normalize
  #       kwargs:
  #         gamma: 0.7
  #
  # - path: null
  #   channels:
  #     foreground:
  #       - function: ultrack.imgproc.detect_foreground
  #         input_channels:
  #           - nuclei_prediction
  #         kwargs:
  #           sigma: 80
  #     contour:
  #       - function: biahub.track.mem_nuc_contour
  #         input_channels:
  #           - nuclei_prediction
  #           - membrane_prediction
  #         kwargs: {}

tracking_config:
  segmentation_config:
    min_area: 2500
    max_area: 80000
    n_workers: 10
    min_frontier: 0.5
    max_noise: 0.00
  linking_config:
    n_workers: 10
    max_distance: 15
    distance_weight: -0.0001
    max_neighbors: 3
  tracking_config:
    n_threads: 14
    disappear_weight: -0.0001
    appear_weight: -0.001
    division_weight: -0.0001
    bias: 0.0001
