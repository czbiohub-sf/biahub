input_channel_names: ["BF - Oblique"]
time_indices: "all"
reconstruction_dimension: 3
phase:
  transfer_function:
    wavelength_illumination: 0.450
    # yx_pixel_size and z_pixel_size are resolved from the deskew output zarr
    # by init-reconstruct. Uncomment to override with specific values:
    # yx_pixel_size: 0.1494
    # z_pixel_size: 0.174
    z_padding: 5
    index_of_refraction_media: 1.4
    numerical_aperture_detection: 1.35
    numerical_aperture_illumination: 0.52
    invert_phase_contrast: false
  apply_inverse:
    reconstruction_algorithm: Tikhonov
    regularization_strength: 0.01
    TV_rho_strength: 0.001
    TV_iterations: 1
